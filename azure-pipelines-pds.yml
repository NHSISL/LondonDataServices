# ASP.NET
# Build and test ASP.NET projects.
# Add steps that publish symbols, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/apps/aspnet/build-aspnet-4

trigger:
- main

variables:
  - name: solution
    value: '**/*.sln'

pool:
  vmImage: ubuntu-latest

workspace:
  clean: all

steps:   
  - task: UseDotNet@2
    displayName: "Install .NET Core SDK"
    inputs:
      version: 9.x
      performMultiLevelLookup: true
      includePreviewVersions: true # Required for preview versions

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Restore"
    inputs:
      command: "restore"
      feedsToUse: "select"
      projects: "**/*.csproj"
      includeNuGetOrg: true
 
  - task: DotNetCoreCLI@2
    displayName: "Dotnet Build (PDS Function)"
    inputs:
      command: 'build'
      projects: '**/LHDS.Functions.Pds.csproj'
      arguments: --output $(System.DefaultWorkingDirectory)/publish_output_pds_func --configuration Release
  
  - task: ArchiveFiles@2
    condition: ne(variables['Build.Reason'], 'PullRequest')
    displayName: 'Archive files - Pds Function'
    inputs:
      rootFolderOrFile: '$(System.DefaultWorkingDirectory)/publish_output_pds_func'
      includeRootFolder: false
      archiveType: zip
      archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_pds_func.zip
      replaceExistingArchive: true

  - publish: $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_pds_func.zip
    condition: ne(variables['Build.Reason'], 'PullRequest')
    displayName: 'Publish Artifact - PDS Function'
    artifact: drop-pds-func
