    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    inputs:
      command: "publish"
      publishWebProjects: false
      projects: "**/LHDS.AdminPortal.Web.csproj"
      arguments: "-o $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_test_frontend_website --configuration Test"
      zipAfterPublish: true
      modifyOutputPath: false

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Publish Frontend (PreProduction)"
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    inputs:
      command: "publish"
      publishWebProjects: false
      projects: "**/LHDS.AdminPortal.Web.csproj"
      arguments: "-o $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_preproduction_frontend_website --configuration PreProduction"
      zipAfterPublish: true
      modifyOutputPath: false

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Publish Frontend (Production)"
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    inputs:
      command: "publish"
      publishWebProjects: false
