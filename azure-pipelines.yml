# ASP.NET
# Build and test ASP.NET projects.
# Add steps that publish symbols, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/apps/aspnet/build-aspnet-4

trigger:
- main

variables:
  - group: global-variables
  - name: solution
    value: '**/*.sln'
  - name: vmImage
    value: 'ubuntu-latest'
  - name: webProjectName
    value: 'LHDS.AdminPortal.Web'

steps:

  - task: UseDotNet@2
    displayName: "Install .NET Core SDK"
    inputs:
      version: 7.x
      performMultiLevelLookup: true
      includePreviewVersions: true # Required for preview versions

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Restore"
    inputs:
      command: "restore"
      feedsToUse: "select"
      projects: "**/*.csproj"
      includeNuGetOrg: true

  - task: DotNetCoreCLI@2
    displayName: C# Unit Tests
    inputs:
      command: 'test'
      projects: '**/*.Tests.Unit.csproj'

  - task: Bash@3
    enabled: true
    displayName: Install Docker
    inputs:
      targetType: inline
      script: >-
        sudo apt update
          
        sudo apt install apt-transport-https ca-certificates curl
        software-properties-common -y
        
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo
        apt-key add -
        
        sudo add-apt-repository "deb [arch=amd64]
        https://download.docker.com/linux/ubuntu bionic stable"
        
        sudo add-apt-repository "deb [arch=amd64]
        https://download.docker.com/linux/ubuntu bionic stable"
        
        sudo apt update
        
        apt-cache policy docker-ce
        
        sudo apt install docker-ce -y
        
        sudo systemctl start docker

  - task: Bash@3
    enabled: true
    displayName: Pulling Required Docker Images for SQL Server
    inputs:
      targetType: inline
      script: |-
        sudo docker run -e "ACCEPT_EULA=Y" -e "MSSQL_SA_PASSWORD=1Password" \
            -p 1433:1433 --name sql1 --hostname sql1 \
            -d \
            mcr.microsoft.com/mssql/server:2022-latest

  - task: DotNetCoreCLI@2
    displayName: C# Acceptance Tests
    inputs:
      command: 'test'
      projects: '**/*.Tests.Acceptance.csproj'
      arguments: '--environment ASPNETCORE_ENVIRONMENT=ContinuousIntegration'
      envVars: 'ASPNETCORE_ENVIRONMENT=ContinuousIntegration'
      environmentVariables: |
        LHDS_MESHCONFIGURATION__MAILBOXID=$(LHDS_MESHCONFIGURATION__MAILBOXID)
        LHDS_MESHCONFIGURATION__PASSWORD=$(LHDS_MESHCONFIGURATION__PASSWORD)
        LHDS_MESHCONFIGURATION__KEY=$(LHDS_MESHCONFIGURATION__KEY)
        LHDS_MESHCONFIGURATION__ROOTCERTIFICATE=$(LHDS_MESHCONFIGURATION__ROOTCERTIFICATE)
        LHDS_MESHCONFIGURATION__INTERMEDIATECERTIFICATES__0=$(LHDS_MESHCONFIGURATION__INTERMEDIATECERTIFICATES__0)
        LHDS_MESHCONFIGURATION__CLIENTCERTIFICATE=$(LHDS_MESHCONFIGURATION__CLIENTCERTIFICATE)
        LHDS_CRYPTOGRAPHY__PRIVATEKEY=$(LHDS_CRYPTOGRAPHY__PRIVATEKEY)
        LHDS_CRYPTOGRAPHY__PUBLICKEY=$(LHDS_CRYPTOGRAPHY__PUBLICKEY)
        LHDS_CRYPTOGRAPHY__PASSPHRASE=$(LHDS_CRYPTOGRAPHY__PASSPHRASE)
        LHDS_FTPDOWNLOAD__FTPSERVER=$(LHDS_FTPDOWNLOAD__FTPSERVER)
        LHDS_FTPDOWNLOAD__FTPPORT=$(LHDS_FTPDOWNLOAD__FTPPORT)
        LHDS_FTPDOWNLOAD__FTPPASSWORD=$(LHDS_FTPDOWNLOAD__FTPPASSWORD)
        LHDS_FTPDOWNLOAD__FTPUSERNAME=$(LHDS_FTPDOWNLOAD__FTPUSERNAME)
        LHDS_FTPDOWNLOAD__FTPKEY=$(LHDS_FTPDOWNLOAD__FTPKEY)
        LHDS_FTPDOWNLOAD__FTPPASSPHRASE=$(LHDS_FTPDOWNLOAD__FTPPASSPHRASE)

  - task: Npm@1
    displayName: NPM Install
    inputs:
      workingDir: '$(webProjectName)/ClientApp'
      command: 'install'

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Build (API)"
    inputs:
      command: 'build'
      projects: '**/LHDS.AdminPortal.Api.csproj'
      arguments: --output $(System.DefaultWorkingDirectory)/publish_output_website_api --configuration Release

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Build (Frontend)"
    inputs:
      command: 'build'
      projects: '**/LHDS.AdminPortal.Web.csproj'
      arguments: --output $(System.DefaultWorkingDirectory)/publish_output_website_frontend --configuration Release

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Build (EMIS Landing Function)"
    inputs:
      command: 'build'
      projects: '**/LHDS.Functions.Landings.Emis.csproj'
      arguments: --output $(System.DefaultWorkingDirectory)/publish_output_emis_func --configuration Release

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Build (Opt-Out Function)"
    inputs:
      command: 'build'
      projects: '**/LHDS.Functions.OptOut.csproj'
      arguments: --output $(System.DefaultWorkingDirectory)/publish_output_optout_func --configuration Release

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Build (PDS Function)"
    inputs:
      command: 'build'
      projects: '**/LHDS.Functions.Pds.csproj'
      arguments: --output $(System.DefaultWorkingDirectory)/publish_output_pds_func --configuration Release
  
  #- task: DotNetCoreCLI@2
  #  displayName: C# Integration Tests
  #  inputs:
  #    command: 'test'
  #    projects: '**/*.Tests.Integration.*.csproj'
      
  - task: Npm@1 
    displayName: Run Code linting
    inputs:
      command: 'custom'
      workingDir: $(webProjectName)/ClientApp
      customCommand: 'run lint'

  #- task: Npm@1
  #  displayName: Client Tests
  #  inputs:
  #    command: 'custom'
  #    workingDir: $(webProjectName)/ClientApp
  #    customCommand: 'run test:ci'    

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Publish Frontend (Development)"
    condition: ne(variables['Build.Reason'], 'PullRequest')
    inputs:
      command: "publish"
      publishWebProjects: false
      projects: "**/LHDS.AdminPortal.Web.csproj"
      arguments: "-o $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_development_frontend_website --configuration Development"
      zipAfterPublish: true
      modifyOutputPath: false
 
  - task: DotNetCoreCLI@2
    displayName: "Dotnet Publish API (Test)"
    condition: ne(variables['Build.Reason'], 'PullRequest')
    inputs:
      command: "publish"
      publishWebProjects: false
      projects: "**/LHDS.AdminPortal.Api.csproj"
      arguments: "-o $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_api_website --configuration Test"
      zipAfterPublish: true
      modifyOutputPath: false

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Publish API (Production)"
    condition: ne(variables['Build.Reason'], 'PullRequest')
    inputs:
      command: "publish"
      publishWebProjects: false
      projects: "**/LHDS.AdminPortal.Api.csproj"
      arguments: "-o $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_api_website --configuration Production"
      zipAfterPublish: true
      modifyOutputPath: false

