  - task: ArchiveFiles@2
    condition: ne(variables['Build.Reason'], 'PullRequest')  
    displayName: 'Archive files - API'
    inputs:
      rootFolderOrFile: '$(System.DefaultWorkingDirectory)/publish_output_website_api'
      includeRootFolder: false
      archiveType: zip
      archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_website_api.zip
      replaceExistingArchive: true

  - task: ArchiveFiles@2
    condition: ne(variables['Build.Reason'], 'PullRequest')  
    displayName: 'Archive files - Frontend'
    inputs:
      rootFolderOrFile: '$(System.DefaultWorkingDirectory)/publish_output_website_frontend'
      includeRootFolder: false
      archiveType: zip
      archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_wensite_frontend.zip
      replaceExistingArchive: true

  - task: ArchiveFiles@2
    condition: ne(variables['Build.Reason'], 'PullRequest')  
    displayName: 'Archive files - Emis Function'
    inputs:
      rootFolderOrFile: '$(System.DefaultWorkingDirectory)/publish_output_emis_func'
      includeRootFolder: false
      archiveType: zip
      archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_emis_func.zip
      replaceExistingArchive: true

  - task: ArchiveFiles@2
    condition: ne(variables['Build.Reason'], 'PullRequest')
    displayName: 'Archive files - OptOut Function'
    inputs:
      rootFolderOrFile: '$(System.DefaultWorkingDirectory)/publish_output_optout_func'
      includeRootFolder: false
      archiveType: zip
      archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_optout_func.zip
      replaceExistingArchive: true

  - publish: $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_website_api.zip
    condition: ne(variables['Build.Reason'], 'PullRequest')  
    displayName: 'Publish Artifact - API'
    artifact: drop-api

  - publish: $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_website_frontend.zip
    condition: ne(variables['Build.Reason'], 'PullRequest')  
    displayName: 'Publish Artifact - Frontend'
    artifact: drop-frontend

  - publish: $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_emis_func.zip
    condition: ne(variables['Build.Reason'], 'PullRequest')  
    displayName: 'Publish Artifact - Emis Function'
    artifact: drop-emis-func

  - publish: $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_optout_func.zip
    condition: ne(variables['Build.Reason'], 'PullRequest')
    displayName: 'Publish Artifact - Opt-Out Function'
    artifact: drop-optout-func
