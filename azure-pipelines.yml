  - task: ArchiveFiles@2
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))  
    displayName: 'Archive files - Tpp Function'
    inputs:
      rootFolderOrFile: '$(System.DefaultWorkingDirectory)/publish_output_tpp_func'
      includeRootFolder: false
      archiveType: zip
      archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_tpp_func.zip
