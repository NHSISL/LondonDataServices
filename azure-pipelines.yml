    displayName: 'Publish Artifact - Opt-Out Function'
    artifact: drop-optout-func

  - publish: $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_pds_func.zip
    condition: ne(variables['Build.Reason'], 'PullRequest')
    displayName: 'Publish Artifact - PDS Function'
    artifact: drop-pds-func
