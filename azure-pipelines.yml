  #  inputs:
  #    command: 'custom'
  #    workingDir: $(webProjectName)/ClientApp
  #    customCommand: 'run test:ci'    

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Publish Frontend (Development)"
    condition: ne(variables['Build.Reason'], 'PullRequest')
    inputs:
      command: "publish"
      publishWebProjects: false
      projects: "**/LHDS.AdminPortal.Web.csproj"
      arguments: "-o $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_development_frontend_website --configuration Development"
      zipAfterPublish: true
      modifyOutputPath: false

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Publish Frontend (idev)"
    condition: ne(variables['Build.Reason'], 'PullRequest')
    inputs:
      command: "publish"
      publishWebProjects: false
      projects: "**/LHDS.AdminPortal.Web.csproj"
      arguments: "-o $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_idev_frontend_website --configuration idev"
      zipAfterPublish: true
      modifyOutputPath: false

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Publish Frontend (odev)"
    condition: ne(variables['Build.Reason'], 'PullRequest')
    inputs:
      command: "publish"
      publishWebProjects: false
      projects: "**/LHDS.AdminPortal.Web.csproj"
      arguments: "-o $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_odev_frontend_website --configuration odev"
      zipAfterPublish: true
      modifyOutputPath: false

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Publish Frontend (Test)"
    condition: ne(variables['Build.Reason'], 'PullRequest')
    inputs:
      command: "publish"
      publishWebProjects: false
      projects: "**/LHDS.AdminPortal.Web.csproj"
      arguments: "-o $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_test_frontend_website --configuration Test"
      zipAfterPublish: true
      modifyOutputPath: false

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Publish Frontend (Production)"
    condition: ne(variables['Build.Reason'], 'PullRequest')
    inputs:
      command: "publish"
      publishWebProjects: false
      projects: "**/LHDS.AdminPortal.Web.csproj"
      arguments: "-o $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_production_frontend_website --configuration Production"
      zipAfterPublish: true
      modifyOutputPath: false

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Publish API"
    condition: ne(variables['Build.Reason'], 'PullRequest')
    inputs:
      command: "publish"
      publishWebProjects: false
      projects: "**/LHDS.AdminPortal.Api.csproj"
      arguments: "-o $(Build.ArtifactStagingDirectory)/$(Build.BuildId)_api_website --configuration Release"
      zipAfterPublish: true
      modifyOutputPath: false

