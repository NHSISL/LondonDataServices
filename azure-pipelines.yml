# ASP.NET
# Build and test ASP.NET projects.
# Add steps that publish symbols, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/apps/aspnet/build-aspnet-4

trigger:
- main

variables:
  solution: '**/*.sln'
  # Agent VM image name
  vmImage: ubuntu-latest
  webProjectName: 'LHDS.AdminPortal.Web'

steps:
  - task: UseDotNet@2
    displayName: "Install .NET Core SDK"
    inputs:
      version: 7.x
      performMultiLevelLookup: true
      includePreviewVersions: true # Required for preview versions

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Restore"
    inputs:
      command: "restore"
      feedsToUse: "select"
      projects: "**/*.csproj"
      includeNuGetOrg: true

  - task: DotNetCoreCLI@2
    displayName: C# Unit Tests
    inputs:
      command: 'test'
      projects: '**/*.Tests.Unit.csproj'

  - task: DotNetCoreCLI@2
    displayName: C# Acceptance Tests
    inputs:
      command: 'test'
      projects: '**/*.Core.Tests.Acceptance.csproj'

  - task: Npm@1
    displayName: NPM Install
    inputs:
      workingDir: '$(webProjectName)/ClientApp'
      command: 'install'

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Build (API)"
    inputs:
      command: 'build'
      projects: '**/LHDS.AdminPortal.Api.csproj'
      arguments: --output $(System.DefaultWorkingDirectory)/publish_output_website_api --configuration Release

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Build (Frontend)"
    inputs:
      command: 'build'
      projects: '**/LHDS.AdminPortal.Web.csproj'
      arguments: --output $(System.DefaultWorkingDirectory)/publish_output_website_frontend --configuration Release

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Build (EMIS Landing Function)"
    inputs:
      command: 'build'
      projects: '**/LHDS.Functions.Landings.Emis.csproj'
      arguments: --output $(System.DefaultWorkingDirectory)/publish_output_emis_func --configuration Release

  - task: DotNetCoreCLI@2
    displayName: "Dotnet Build (Opt-Out Function)"
    inputs:
      command: 'build'
      projects: '**/LHDS.Functions.OptOut.csproj'
      arguments: --output $(System.DefaultWorkingDirectory)/publish_output_optout_func --configuration Release
  
  #- task: DotNetCoreCLI@2
  #  displayName: C# Integration Tests
  #  inputs:
  #    command: 'test'
  #    projects: '**/*.Tests.Integration.*.csproj'
      
  - task: Npm@1 
    displayName: Run Code linting
    inputs:
      command: 'custom'
      workingDir: $(webProjectName)/ClientApp
      customCommand: 'run lint'

